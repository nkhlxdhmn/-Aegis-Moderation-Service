name: Docker

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-cpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build default image (CPU, no GPU required)
        run: docker build -t aegis-moderation:ci .
      - name: Smoke-test health endpoint
        run: |
          docker run -d --name aegis-ci -e MODEL_WARMUP=false -p 8000:8000 aegis-moderation:ci
          for i in $(seq 1 30); do
            sleep 2
            if curl -sf http://localhost:8000/health; then echo "OK"; exit 0; fi
          done
          echo "Health check timed out"; docker logs aegis-ci; exit 1
