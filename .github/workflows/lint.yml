name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install tools
        run: python -m pip install --upgrade pip ruff black
      - name: Ruff
        run: ruff check .
      - name: Black
        run: black --check .
