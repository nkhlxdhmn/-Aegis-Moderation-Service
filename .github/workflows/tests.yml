name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install fastapi uvicorn pydantic python-multipart httpx \
            pillow pypdf python-docx requests pytest pytest-asyncio
      - name: Run tests
        run: python -m pytest tests/test_main.py tests/test_standalone_report.py -v
