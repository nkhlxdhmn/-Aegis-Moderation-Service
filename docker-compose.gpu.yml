services:
  aegis-moderation:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    image: aegis-moderation-gpu:1.0.0
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      MODEL_WARMUP: "true"
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
    volumes:
      - hf_cache:/home/aegis/.cache/huggingface
      - app_data:/app/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  hf_cache:
  app_data:
